<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exos Code Labs | Technology Nexus</title>
    <style>
        /* Base de Estructura Profesional */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Efecto de fondo tecnológico (Destellos) */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }

        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* Contenido Principal */
        .container {
            z-index: 1;
            text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 40px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(to right, #00d2ff, #9d50bb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-comenzar {
            display: inline-block;
            padding: 15px 50px;
            color: #00d2ff;
            border: 1px solid #00d2ff;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-comenzar:hover {
            background: #00d2ff;
            color: #050505;
            box-shadow: 0 0 25px #00d2ff;
        }
    </style>
</head>
<body>

    <div class="stars" id="sparkle-container"></div>

    <div class="container">
        <h1>Bienvenido a Exos Code Labs</h1>
        <a href="index2.html" class="btn-comenzar">Comenzemos</a>
    </div>

    <script>
        // Generador dinámico de destellos tecnológicos
        const container = document.getElementById('sparkle-container');
        for (let i = 0; i < 50; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.width = Math.random() * 3 + 'px';
            sparkle.style.height = sparkle.style.width;
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 4 + 's';
            container.appendChild(sparkle);
        }
    </script>
</body>
</html>
